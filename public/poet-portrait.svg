<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">Poet Portrait Placeholder</title>
  <desc id="desc">Abstract portrait style placeholder with warm tones for Nuy's Poetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe2"/>
      <stop offset="100%" stop-color="#e7d7bf"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="35%" r="48%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1100" fill="url(#bg)"/>
  <rect x="50" y="50" width="800" height="1000" rx="48" fill="#f3e8d6"/>
  <circle cx="450" cy="370" r="170" fill="#d1b896"/>
  <rect x="300" y="545" width="300" height="320" rx="140" fill="#8a6b45"/>
  <circle cx="388" cy="350" r="14" fill="#3e2f22"/>
  <circle cx="512" cy="350" r="14" fill="#3e2f22"/>
  <path d="M390 438c36 34 84 34 120 0" fill="none" stroke="#3e2f22" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="450" cy="380" rx="250" ry="210" fill="url(#halo)"/>
  <text x="450" y="950" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#4a3725" opacity="0.85">
    Nuy's Poetry
  </text>
</svg>
